<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TikTok | The Secret Society</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#000;color:white;overflow-x:hidden}
.layout{display:grid;grid-template-columns:245px 1fr;min-height:100vh}
.sidebar{padding:22px;border-right:1px solid #181818;position:sticky;top:0;height:100vh}
.logo{font-size:32px;font-weight:800;margin-bottom:18px}
.search{background:#222;border-radius:24px;padding:13px 16px;color:#aaa;margin-bottom:20px}
.menu div,.menu a{display:block;padding:13px 0;font-size:18px;font-weight:700;color:white;text-decoration:none}
.menu .active{color:#ff2d55}
.feed{height:100vh;overflow-y:auto;scroll-snap-type:y mandatory}
.viewer{display:flex;justify-content:center;align-items:center;min-height:100vh;padding:18px 90px 18px 18px;position:relative;scroll-snap-align:start}
.phone{height:92vh;max-height:900px;aspect-ratio:9/16;border-radius:14px;overflow:hidden;background:#111;position:relative;box-shadow:0 0 0 1px #222}
.phone img{width:100%;height:100%;object-fit:cover}
.caption{position:absolute;left:18px;right:18px;bottom:20px;text-shadow:0 2px 5px #000;font-weight:700}
.caption b{display:block;margin-bottom:8px}
.overlay-text{position:absolute;top:45%;left:50%;transform:translate(-50%,-50%);font-size:24px;font-weight:800;text-align:center;text-shadow:0 3px 7px #000}
.actions{position:absolute;right:28px;top:50%;transform:translateY(-50%);display:grid;gap:18px;text-align:center}
.action-btn{border:0;color:white;background:transparent;font:inherit;cursor:pointer}
.bubble{width:54px;height:54px;border-radius:50%;background:#222;display:grid;place-items:center;font-size:26px}
.count{font-size:13px;font-weight:700;margin-top:5px}
.comments{position:fixed;top:0;right:0;width:390px;max-width:100%;height:100vh;background:#111;border-left:1px solid #282828;z-index:20;transform:translateX(100%);transition:.3s;padding:18px;overflow:auto}
.comments.open{transform:translateX(0)}
.comments-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.close{background:#222;color:white;border:0;border-radius:50%;width:34px;height:34px;font-size:20px;cursor:pointer}
.comment{display:grid;grid-template-columns:42px 1fr;gap:12px;margin-bottom:22px}
.comment img{width:42px;height:42px;border-radius:50%;object-fit:cover}
.comment b{display:block;margin-bottom:5px}
.comment p{line-height:1.35;font-weight:700}
.meta{font-size:13px;color:#aaa;margin-top:8px}
.comment-input{position:sticky;bottom:0;background:#111;padding-top:12px;display:flex;gap:8px}
.comment-input input{flex:1;background:#222;border:0;border-radius:22px;padding:13px;color:white}
.comment-input button{width:42px;border:0;border-radius:50%;background:#ff2d55;color:white;font-weight:700}
@media(max-width:850px){.layout{grid-template-columns:1fr}.sidebar{display:none}.viewer{padding:14px 78px 14px 14px}.phone{height:88vh}.comments{width:100%;height:72vh;top:auto;bottom:0;transform:translateY(100%);border-left:0;border-top:1px solid #282828;border-radius:18px 18px 0 0}.comments.open{transform:translateY(0)}}
</style>
</head>
<body>
<div class="layout">
  <aside class="sidebar">
    <div class="logo">TikTok</div>
    <div class="search">Buscar</div>
    <nav class="menu">
      <div class="active">Para ti</div><div>Explorar</div><div>Siguiendo</div><div>LIVE</div><div>Mensajes</div><div>Perfil</div>
      <a href="redes.html">Volver a redes</a>
    </nav>
  </aside>

  <main class="feed" id="feed"></main>
</div>

<aside class="comments" id="comments">
  <div class="comments-head">
    <h2>Comentarios <span style="color:#777">5797</span></h2>
    <button class="close" onclick="cerrarComentarios()">×</button>
  </div>

  <div id="commentsList"></div>

  <div class="comment-input">
    <input type="text" placeholder="Agregar comentario...">
    <button>↑</button>
  </div>
</aside>

<script>

  { user:"@𝖇𝖆𝖇𝖇𝖞_𝖙𝖆𝖑𝖐𝖎𝖓𝖌", avatar:"Sorenf.PNG", img:"Sorenp1.PNG", text:"" },

const comentarios = [
  { img:"Ellief.PNG", user:"@butterfly1", text:"" },
  { img:"Axelf.PNG", user:"@axxelitouwuww", text:"" },

  { img:"Jossf.PNG", user:"@Reed_clk", text:"" }
];

const feed = document.getElementById("feed");

videos.forEach((video, i) => {
  feed.innerHTML += `
    <section class="viewer">
      <section class="phone">
        <img src="${video.img}" alt="Video ${i + 1}">
        ${video.text ? `<div class="overlay-text">${video.text}</div>` : ""}
        <div class="caption">
          <b>${video.user}</b>
          ${video.text || ""}
        </div>
      </section>

      <aside class="actions">
        <div><div class="bubble">♡</div><div class="count">${14 + i}.9K</div></div>
        <button class="action-btn" onclick="abrirComentarios()">
          <div class="bubble">💬</div>
          <div class="count">${5797 + i}</div>
        </button>
        <div><div class="bubble">↗</div><div class="count">${516 + i}</div></div>
        <div><div class="bubble">🔖</div><div class="count">${2264 + i}</div></div>
      </aside>
    </section>
  `;
});

function abrirComentarios() {
  const commentsList = document.getElementById("commentsList");
  commentsList.innerHTML = "";

  comentarios.forEach(c => {
    commentsList.innerHTML += `
      <div class="comment">
        <img src="${c.img}">
        <div>
          <b>${c.user}</b>
          <p>${c.text}</p>
          <div class="meta">Hace 6 d · Responder · ♡</div>
        </div>
      </div>
    `;
  });

  document.getElementById("comments").classList.add("open");
}

function cerrarComentarios() {
  document.getElementById("comments").classList.remove("open");
}
</script>
</body>
</html>
