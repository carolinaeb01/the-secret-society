<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Facebook | The Secret Society</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f2f5;color:#111}
.top{height:56px;background:white;display:flex;align-items:center;gap:16px;padding:0 16px;box-shadow:0 1px 4px #ccc;position:sticky;top:0;z-index:5}
.logo{font-size:34px;color:#1877f2;font-weight:700}
.search{background:#eef0f3;border-radius:24px;padding:12px 18px;color:#666;width:240px}
.layout{display:grid;grid-template-columns:280px 1fr 320px;gap:24px;padding:18px}
.left,.right{position:sticky;top:78px;height:calc(100vh - 90px)}
.menu div,.menu a{display:block;padding:13px;font-size:17px;color:#111;text-decoration:none}
.feed{max-width:680px;margin:auto}
.composer,.post{background:white;border-radius:10px;box-shadow:0 1px 3px #d0d0d0;margin-bottom:16px}
.composer{padding:14px;display:flex;gap:12px;align-items:center}
.avatar{width:42px;height:42px;border-radius:50%;object-fit:cover}
.input{background:#f0f2f5;border-radius:25px;padding:13px;color:#666;flex:1}
.slider-wrap{position:relative;margin-bottom:16px}
.stories{display:flex;gap:10px;overflow:hidden;scroll-behavior:smooth;padding:4px 44px}
.story{min-width:120px;height:190px;border-radius:10px;overflow:hidden;position:relative;background:#ddd;flex:0 0 auto}
.story img{width:100%;height:100%;object-fit:cover}
.story span{position:absolute;bottom:10px;left:9px;color:white;font-weight:700;text-shadow:0 2px 4px #000}
.slider-btn{position:absolute;top:80px;z-index:5;width:34px;height:34px;border:0;border-radius:50%;background:white;box-shadow:0 2px 8px rgba(0,0,0,.18);cursor:pointer;font-size:20px}
.slider-btn.left{left:4px}.slider-btn.right{right:4px}
.post{overflow:hidden}
.post-head{display:flex;align-items:center;gap:10px;padding:14px}
.name{font-weight:700}.date{font-size:13px;color:#666}
.text{padding:0 14px 12px;line-height:1.45;white-space:pre-line}
.post-img{width:100%;max-height:620px;object-fit:contain;background:#111}
.actions{display:flex;justify-content:space-around;padding:12px;border-top:1px solid #eee;color:#555;font-weight:700}
.ad{background:white;border-radius:10px;padding:12px;margin-bottom:16px}
.ad img{width:100%;border-radius:8px}
@media(max-width:950px){.layout{grid-template-columns:1fr}.left,.right{display:none}.search{width:auto}.feed{width:100%}}
</style>
</head>
<body>
<header class="top">
  <div class="logo">f</div>
  <div class="search">Buscar en Facebook</div>
</header>

<div class="layout">
  <aside class="left">
    <div class="menu">
      <div>Inicio</div><div>Amigos</div><div>Recuerdos</div><div>Guardado</div><div>Grupos</div>
      <a href="redes.html">Volver a redes</a>
    </div>
  </aside>

  <main class="feed">
    <section class="composer">
      <img class="avatar" src="Seth.png">
      <div class="input">¿Qué está pensando The Secret Society?</div>
    </section>

    <div class="slider-wrap">
      <button class="slider-btn left" onclick="moverStories(-1)">‹</button>
      <section class="stories" id="stories"></section>
      <button class="slider-btn right" onclick="moverStories(1)">›</button>
    </div>

    <section id="posts"></section>
  </main>

  <aside class="right">
    <div class="ad"><b>Sugerencias para ti</b><br><br><img src="Ellief.PNG"></div>
    <div class="ad"><b>Personas que quizá conozcas</b><br><br>Axel Brigest · Marcos Miller · Ellie Ikeyli</div>
  </aside>
</div>

const stories = document.getElementById("stories");
perfiles.forEach((perfil, i) => {
  stories.innerHTML += `
    <div class="story">
      <img src="${perfil.avatar}" alt="${perfil.nombre}">
      <span>${perfil.nombre}</span>
    </div>
  `;
});

const posts = document.getElementById("posts");
perfiles.filter(p => p.posts.length > 0).forEach((perfil, i) => {
  posts.innerHTML += `
    <article class="post">
      <div class="post-head">
        <img class="avatar" src="${perfil.avatar}">
        <div><div class="name">${perfil.nombre}</div><div class="date">Hace ${i + 1} h · Público</div></div>
      </div>
      ${perfil.caption ? `<p class="text">${perfil.caption}</p>` : ""}
      <img class="post-img" src="${perfil.posts[0]}" alt="Publicación de ${perfil.nombre}">
      <div class="actions"><span>Me gusta</span><span>Comentar</span><span>Compartir</span></div>
    </article>
  `;
});

function moverStories(direccion){
  document.getElementById("stories").scrollLeft += direccion * 260;
}
</script>
</body>
</html>
