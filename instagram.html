<title>Instagram | The Secret Society</title>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#fff;color:#111}
.layout{display:grid;grid-template-columns:245px 1fr 320px;min-height:100vh}
.sidebar{border-right:1px solid #ddd;padding:24px;position:sticky;top:0;height:100vh}
.logo{font-size:28px;font-weight:700;margin-bottom:38px}
.nav a,.nav button{display:block;color:#111;text-decoration:none;font-size:17px;padding:14px 0;background:none;border:0;cursor:pointer;text-align:left;width:100%}
.feed{max-width:760px;margin:0 auto;padding:22px;width:100%}
.slider-wrap{position:relative;margin-bottom:34px}
.stories{display:flex;gap:16px;overflow:hidden;scroll-behavior:smooth;padding:4px 44px}
.story{width:78px;text-align:center;font-size:12px;flex:0 0 auto;color:#111;text-decoration:none}
.story .circle{width:70px;height:70px;border-radius:50%;padding:3px;background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7);margin:auto}
.story img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:3px solid white}
.slider-btn{position:absolute;top:28px;z-index:5;width:30px;height:30px;border:0;border-radius:50%;background:rgba(255,255,255,.95);box-shadow:0 2px 8px rgba(0,0,0,.18);cursor:pointer;font-size:18px}
.slider-btn.left{left:4px}
.slider-btn.right{right:4px}
.post{border-bottom:1px solid #ddd;padding-bottom:30px;margin-bottom:34px}
.post-head{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.avatar{width:36px;height:36px;border-radius:50%;object-fit:cover}
.user{font-weight:700;cursor:pointer}.time{color:#777;font-weight:400}
.post-img{width:100%;aspect-ratio:1/1;background:#eee;border-radius:4px;object-fit:cover;cursor:pointer}
.actions{display:flex;gap:16px;font-size:27px;margin:12px 0}
.caption{line-height:1.45;font-size:15px}
.side{padding:36px 20px;color:#555}
.suggestion{display:flex;align-items:center;gap:12px;margin:18px 0}
.suggestion img{width:44px;height:44px;border-radius:50%;object-fit:cover}
.back{position:fixed;bottom:18px;left:24px;color:#111;text-decoration:none;font-weight:700}

.profile{max-width:940px;margin:auto}
.profile-top{display:grid;grid-template-columns:170px 1fr;gap:42px;align-items:center;border-bottom:1px solid #ddd;padding:24px 0 38px}
.profile-avatar{width:150px;height:150px;border-radius:50%;padding:4px;background:linear-gradient(45deg,#f9ce34,#ee2a7b,#6228d7)}
.profile-avatar img{width:100%;height:100%;border-radius:50%;object-fit:cover;border:4px solid #fff}
.profile-name{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:18px}
.profile-name h1{font-size:26px;font-weight:400}
.profile-name button{border:0;background:#efefef;border-radius:8px;padding:8px 14px;font-weight:700}
.stats{display:flex;gap:28px;margin-bottom:18px}
.stats span{font-size:16px}
.bio{line-height:1.45}
.bio b{display:block}
.highlights{display:flex;gap:22px;margin:26px 0}
.highlight{text-align:center;font-size:13px}
.highlight div{width:72px;height:72px;border-radius:50%;border:1px solid #bbb;padding:3px;margin-bottom:6px}
.highlight img{width:100%;height:100%;border-radius:50%;object-fit:cover}
.tabs{display:flex;justify-content:center;gap:70px;border-top:1px solid #ddd;margin-top:18px}
.tabs span{padding:16px 0;font-size:13px;font-weight:700;color:#555}
.grid-posts{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.grid-post{aspect-ratio:1/1;position:relative;overflow:hidden;background:#eee;cursor:pointer}
.grid-post img{width:100%;height:100%;object-fit:cover;transition:.3s}
.grid-post:hover img{filter:brightness(.55);transform:scale(1.04)}
.grid-post::after{content:"♡  1.2K   💬  48";position:absolute;inset:0;display:grid;place-items:center;color:white;font-weight:700;opacity:0;transition:.25s}
.grid-post:hover::after{opacity:1}

.modal{position:fixed;inset:0;background:rgba(0,0,0,.68);z-index:100;display:none;align-items:center;justify-content:center;padding:24px}
.modal.open{display:flex}
.modal-card{width:min(1180px,100%);height:min(760px,92vh);background:white;display:grid;grid-template-columns:1.25fr .75fr;border-radius:4px;overflow:hidden}
.modal-image{background:#000;display:grid;place-items:center}
.modal-image img{width:100%;height:100%;object-fit:contain}
.modal-info{display:flex;flex-direction:column;min-width:0}
.modal-head{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid #eee}
.modal-head img{width:40px;height:40px;border-radius:50%;object-fit:cover}
.modal-comments{padding:16px;overflow:auto;flex:1}
.comment{display:grid;grid-template-columns:36px 1fr;gap:10px;margin-bottom:18px;font-size:14px;line-height:1.4}
.comment img{width:36px;height:36px;border-radius:50%;object-fit:cover}
.comment b{margin-right:5px}
.modal-bottom{border-top:1px solid #eee;padding:14px}
.modal-actions{font-size:26px;display:flex;gap:14px;margin-bottom:10px}
.modal-close{position:absolute;right:20px;top:16px;background:white;border:0;width:38px;height:38px;border-radius:50%;font-size:24px;cursor:pointer}

.hidden{display:none}

@media(max-width:1000px){
.layout{grid-template-columns:1fr}
.sidebar,.side{display:none}
.feed{padding:16px}
.back{position:static;display:block;margin:20px}
.modal-card{grid-template-columns:1fr;height:90vh}
.modal-info{max-height:42vh}
.profile-top{grid-template-columns:1fr;text-align:center;gap:18px}
.profile-avatar{margin:auto}
.profile-name,.stats{justify-content:center}
}

@media(max-width:650px){
.grid-posts{gap:2px}
.highlights{overflow:auto}
.tabs{gap:36px}
}
</style>

const stories = document.getElementById("stories");
perfiles.forEach((perfil, i) => {
  stories.innerHTML += `
    <a class="story" href="#${perfil.id}" onclick="mostrarPerfil('${perfil.id}')">
      <div class="circle"><img src="${perfil.avatar}" alt="${perfil.nombre}"></div>
      <span>${perfil.nombre}</span>
    </a>
  `;
});

const posts = document.getElementById("posts");
perfiles.filter(perfil => perfil.posts.length > 0).forEach((perfil, i) => {
  const img = perfil.posts[0];

  posts.innerHTML += `
    <article class="post">
      <div class="post-head">
        <img class="avatar" src="${perfil.avatar}" alt="${perfil.nombre}">
        <div>
          <span class="user" onclick="mostrarPerfil('${perfil.id}')">${perfil.nombre}</span>
          <span class="time">· ${i + 1} h</span>
        </div>
      </div>

      <img
        class="post-img"
        src="${img}"
        alt="Publicación ${i + 1}"
        onmouseenter="abrirModal('${img}','${perfil.avatar}','${perfil.nombre}')"
        onclick="abrirModal('${img}','${perfil.avatar}','${perfil.nombre}')"
      >

      <div class="actions">♡ 💬 ↗ ☆</div>
      <p class="caption"><b>${perfil.nombre}</b> ${captions[i] || ""}</p>
    </article>
  `;
});

function moverStories(direccion) {
  const stories = document.getElementById("stories");
  stories.scrollLeft += direccion * 260;
}

function mostrarInicio() {
  document.getElementById("inicioView").classList.remove("hidden");
  document.getElementById("perfilView").classList.add("hidden");
  history.replaceState(null, "", "instagram.html");
}

function mostrarPerfil(id) {
  const perfil = perfiles.find(p => p.id === id);
  if (!perfil) return;

  document.getElementById("inicioView").classList.add("hidden");
  document.getElementById("perfilView").classList.remove("hidden");

  document.getElementById("perfilView").innerHTML = `
    <section class="profile">
      <div class="profile-top">
        <div class="profile-avatar">
          <img src="${perfil.avatar}" alt="${perfil.nombre}">
        </div>

        <div>
          <div class="profile-name">
            <h1>${perfil.nombre}</h1>
            <button>Seguir</button>
            <button>Mensaje</button>
          </div>

         <div class="stats">
  <span><b>${perfil.publicaciones}</b> publicaciones</span>
  <span><b>${perfil.seguidores}</b> seguidores</span>
  <span><b>${perfil.siguiendo}</b> siguiendo</span>
</div>

          <div class="bio">
           
            ${perfil.bio}
          </div>
        </div>
      </div>

      <div class="highlights">
        <div class="highlight"><div><img src="${perfil.avatar}"></div><span></span></div>
        ${
          perfil.posts.length > 0
            ? `
              <div class="highlight"><div><img src="${perfil.posts[1] || perfil.avatar}"></div><span></span></div>
              <div class="highlight"><div><img src="${perfil.posts[2] || perfil.avatar}"></div><span></span></div>
            `
            : ""
        }
      </div>

      <div class="tabs">
        <span>PUBLICACIONES</span>
        <span>REELS</span>
        <span>ETIQUETAS</span>
      </div>

      <div class="grid-posts">
        ${
          perfil.posts.length > 0
            ? perfil.posts.map(img => `
              <div
                class="grid-post"
                onmouseenter="abrirModal('${img}','${perfil.avatar}','${perfil.nombre}')"
                onclick="abrirModal('${img}','${perfil.avatar}','${perfil.nombre}')"
              >
                <img src="${img}" alt="Publicación de ${perfil.nombre}">
              </div>
            `).join("")
            : `<p style="grid-column:1 / -1;text-align:center;color:#777;padding:44px 12px;">
                Aún no hay publicaciones.
              </p>`
        }
      </div>
    </section>
  `;

  history.replaceState(null, "", "#" + id);
  window.scrollTo({ top: 0, behavior: "smooth" });
}

function abrirModal(img, avatar, user) {
  document.getElementById("modalImg").src = img;
  document.getElementById("modalAvatar").src = avatar;
  document.getElementById("modalUser").textContent = user;

  const modalComments = document.getElementById("modalComments");
  modalComments.innerHTML = `
    <div class="comment">
      <img src="${avatar}">
      <div><b>${user}</b></div>
    </div>
  `;

  comentarios.forEach(c => {
    modalComments.innerHTML += `
      <div class="comment">
        <img src="${c.img}">
        <div><b>${c.user}</b> ${c.text}</div>
      </div>
    `;
  });

  document.getElementById("modal").classList.add("open");
}

function cerrarModal() {
  document.getElementById("modal").classList.remove("open");
}

const perfilInicial = location.hash.replace("#", "");
if (perfilInicial) {
  mostrarPerfil(perfilInicial);
}
